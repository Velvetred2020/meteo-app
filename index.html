<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meteo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <h1>Meteo</h1>
            <button id="toggleMode">🌙</button>
        </div>

        <input 
            type="text" 
            id="cityInput" 
            placeholder="Enter cities: London, Paris, Tokyo"
        >

        <button id="searchBtn">Get Weather</button>

        <div id="result" class="cards-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
