<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <h1>Meteo</h1>
            <button id="toggleMode">🌙</button>
        </div>

        <input 
            type="text" 
            id="cityInput" 
            placeholder="Enter cities: London, Paris, Tokyo"
        >

        <button id="searchBtn">Get Weather</button>

        <div id="result" class="cards-container"></div>
    </div>

    <footer>
        <p>
            Weather data by 
            <a href="https://open-meteo.com/" target="_blank">
                Open-Meteo
            </a>
        </p>
    </footer>

    <script src="app.js"></script>

</body>
</html>
